name: Deploy Tablou

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/tablou:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@master
        with:
          host: 178.104.33.34
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /opt/apps/tablou
            cd /opt/apps/tablou
            
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Create/Update .env from Secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Ensure network exists
            docker network create app-network || true
            
            # Connect Nginx Proxy Manager to our network
            docker network connect app-network nginx-proxy-manager-app-1 || true

            # Create/Update docker-compose.yml
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              tablou-app:
                image: ghcr.io/${{ github.repository_owner }}/tablou:latest
                container_name: tablou-app
                restart: unless-stopped
                expose:
                  - "3000"
                env_file: .env
                networks:
                  - app-network

            networks:
              app-network:
                external: true
            EOF
            
            docker compose up -d --pull always
