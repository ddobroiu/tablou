name: Deploy Tablou

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            DATABASE_URL=postgresql://postgres:VZNwxsIoQPFYdEOKadGuRLBfBUxFDpgE@interchange.proxy.rlwy.net:44472/railway

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@master
        with:
          host: 178.104.33.34
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /opt/apps/tablou
            cd /opt/apps/tablou
            
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # Create/Update .env from Secret
            echo "${{ secrets.ENV_CONTENTS }}" > .env
            
            # Create/Update docker-compose.yml (using port 3004 for tablou)
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              app:
                image: ghcr.io/${{ github.repository }}:latest
                restart: unless-stopped
                ports:
                  - '3004:3000'
                env_file: .env
            EOF
            
            docker compose up -d
